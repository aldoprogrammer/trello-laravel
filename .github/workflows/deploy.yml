name: CI/CD Laravel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
      meilisearch:
        image: getmeili/meilisearch:latest
        env:
          MEILI_MASTER_KEY: masterKey
        ports:
          - 7700:7700

    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, xml, ctype, iconv, mysql, gd
      - name: Install Dependencies
        run: composer install --prefer-dist --no-progress
      - name: Security Audit
        run: composer audit
      - name: Run Tests
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: root
          MEILISEARCH_HOST: http://127.0.0.1:7700
          MEILISEARCH_KEY: masterKey
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan migrate --force
          php artisan test

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Upload revision to S3
        id: s3
        run: |
          set -euo pipefail
          BUCKET="laravel-trello-deploy-542973712254"
          KEY="revisions/${{ github.sha }}.zip"
          zip -r /tmp/revision.zip . -x '.git/*' 'node_modules/*' 'mysql-data/*' 'mysql-slave/*' 'meili-data/*' 'terraform/*'
          aws s3 cp /tmp/revision.zip "s3://${BUCKET}/${KEY}"
          echo "bucket=${BUCKET}" >> "$GITHUB_OUTPUT"
          echo "key=${KEY}" >> "$GITHUB_OUTPUT"

      - name: Create CodeDeploy deployment
        run: |
          set -euo pipefail
          BUCKET="${{ steps.s3.outputs.bucket }}"
          KEY="${{ steps.s3.outputs.key }}"

          echo "Deploying from s3://${BUCKET}/${KEY}"

          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name TrelloApp \
            --deployment-group-name TrelloProdGroup \
            --s3-location "bucket=${BUCKET},key=${KEY},bundleType=zip" \
            --file-exists-behavior OVERWRITE \
            --query deploymentId \
            --output text)

          echo "Deployment ID: $DEPLOYMENT_ID"
          echo "View: https://ap-southeast-1.console.aws.amazon.com/codesuite/codedeploy/deployments/${DEPLOYMENT_ID}?region=ap-southeast-1"

          aws deploy wait deployment-successful --deployment-id "$DEPLOYMENT_ID"
