limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

server {
    listen 80;
    index index.php index.html;
    root /var/www/public; # Folder public Laravel

    client_max_body_size 64M;

    # Timeout untuk upload/proses berat
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;

    # Logging & Request ID
    set $request_id_gen $request_id;
    add_header X-Request-ID $request_id_gen;
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;

    # 0. BLOCK SENSITIVE FILES (bot scanners probe for these)
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 1. HANDLE STATIC ASSETS
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|yaml|yml|woff|woff2|ttf|otf)$ {
        expires max;
        log_not_found off;
        access_log off;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # 2. HANDLE PHP-FPM (APP SERVICE)
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000; # Mengarah ke container 'app' port 9000
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param X_REQUEST_ID $request_id_gen;

        # Rate Limiting
        limit_req zone=api_limit burst=10 nodelay;
        limit_req_status 429;
    }

    # 3. HANDLE ALL ROUTES
    location / {
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }
}
