openapi: 3.0.3
info:
  title: Trello Lite API
  version: 1.0.0
  description: API documentation for the Trello Lite backend (Laravel + Sanctum)
servers:
  - url: /
    description: Current host
tags:
  - name: Auth
  - name: Projects
  - name: Tasks
  - name: Companies
  - name: Jobs
paths:
  /api/auth/register:
    $ref: '/api/openapi/files/paths/auth.yaml#/register'
  /api/auth/login:
    $ref: '/api/openapi/files/paths/auth.yaml#/login'
  /api/auth/me:
    $ref: '/api/openapi/files/paths/auth.yaml#/me'
  /api/auth/logout:
    $ref: '/api/openapi/files/paths/auth.yaml#/logout'
  /api/projects:
    $ref: '/api/openapi/files/paths/projects.yaml#/projects'
  /api/projects/{project}:
    $ref: '/api/openapi/files/paths/projects.yaml#/projectById'
  /api/statuses:
    $ref: '/api/openapi/files/paths/tasks.yaml#/statuses'
  /api/projects/{project}/tasks:
    $ref: '/api/openapi/files/paths/tasks.yaml#/projectTasks'
  /api/projects/{project}/tasks/{task}:
    $ref: '/api/openapi/files/paths/tasks.yaml#/projectTaskById'
  /api/companies:
    $ref: '/api/openapi/files/paths/companies.yaml#/companies'
  /api/companies/{company}:
    $ref: '/api/openapi/files/paths/companies.yaml#/companyById'
  /api/jobs:
    $ref: '/api/openapi/files/paths/jobs.yaml#/jobs'
  /api/jobs/{id}/summarize:
    $ref: '/api/openapi/files/paths/jobs.yaml#/summarizeJob'
  /api/jobs/{id}/summary:
    $ref: '/api/openapi/files/paths/jobs.yaml#/jobSummary'
components:
  $ref: '/api/openapi/files/components.yaml#/components'
