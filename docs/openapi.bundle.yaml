openapi: 3.0.3
info:
  title: Trello Lite API
  version: 1.0.0
  description: API documentation for the Trello Lite backend (Laravel + Sanctum)
servers:
  - url: /
    description: Current host
tags:
  - name: System
  - name: Auth
  - name: Projects
  - name: Tasks
  - name: Companies
  - name: Jobs
paths:
  /api/health:
    get:
      tags:
        - System
      summary: Health check for API dependencies
      description: Checks database and Redis availability.
      responses:
        '200':
          description: All core services are healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: UP
                  services:
                    type: object
                    properties:
                      database:
                        type: string
                        example: OK
                      redis:
                        type: string
                        example: OK
                  timestamp:
                    type: string
                    format: date-time
        '500':
          description: One or more services are unavailable
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: DOWN
                  error:
                    type: string
                    example: One or more services are unavailable
                  message:
                    type: string
  /api/auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRegisterRequest'
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAuth'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Login and receive an access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAuth'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /api/auth/me:
    get:
      tags:
        - Auth
      summary: Get the authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseUser'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/auth/logout:
    post:
      tags:
        - Auth
      summary: Revoke the current access token
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEmpty'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/projects:
    get:
      tags:
        - Projects
      summary: List projects for the authenticated user
      security:
        - bearerAuth: []
      parameters:
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 15
          description: Items per page
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseProjects'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - Projects
      summary: Create a project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectRequest'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseProject'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  '/api/projects/{project}':
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags:
        - Projects
      summary: Get project detail
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Project detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseProject'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - Projects
      summary: Update a project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectUpdateRequest'
      responses:
        '200':
          description: Project updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseProject'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    delete:
      tags:
        - Projects
      summary: Delete a project
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Project deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEmpty'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/statuses:
    get:
      tags:
        - Tasks
      summary: List available task statuses
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Task statuses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTaskStatuses'
        '401':
          $ref: '#/components/responses/Unauthorized'
  '/api/projects/{project}/tasks':
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags:
        - Tasks
      summary: List tasks for a project
      security:
        - bearerAuth: []
      parameters:
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 15
          description: Items per page
      responses:
        '200':
          description: Task list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTasks'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags:
        - Tasks
      summary: Create a task for a project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskRequest'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTask'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  '/api/projects/{project}/tasks/{task}':
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/TaskId'
    get:
      tags:
        - Tasks
      summary: Get task detail
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Task detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTask'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - Tasks
      summary: Update a task
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskUpdateRequest'
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTask'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    delete:
      tags:
        - Tasks
      summary: Delete a task
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Task deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEmpty'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/companies:
    get:
      tags:
        - Companies
      summary: List companies with optional filters
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Full-text search keyword (Scout/Meilisearch)
        - name: name
          in: query
          required: false
          schema:
            type: string
          description: Filter by partial company name (SQL LIKE)
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 15
          description: Number of items per page
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Page number
      responses:
        '200':
          description: Paginated company list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyCollectionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - Companies
      summary: Create a company
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyRequest'
      responses:
        '201':
          description: Company created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyStoreResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  '/api/companies/{company}':
    parameters:
      - $ref: '#/components/parameters/CompanyId'
    get:
      tags:
        - Companies
      summary: Get company detail
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Company detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - Companies
      summary: Update a company
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyRequest'
      responses:
        '200':
          description: Company updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyUpdateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    delete:
      tags:
        - Companies
      summary: Delete a company
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Company deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyDeleteResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/jobs:
    get:
      tags:
        - Jobs
      summary: List jobs with search and filters
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Search by title or location (partial match)
        - name: title
          in: query
          required: false
          schema:
            type: string
          description: Filter jobs by title (partial match)
        - name: location
          in: query
          required: false
          schema:
            type: string
          description: Filter jobs by location (partial match)
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 15
          description: Number of records per page
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Page number
      responses:
        '200':
          description: Paginated job list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobCollectionResponse'
    post:
      tags:
        - Jobs
      summary: Create a new job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobRequest'
      responses:
        '201':
          description: Job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResourceResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  '/api/jobs/{id}/summarize':
    parameters:
      - $ref: '#/components/parameters/JobId'
    post:
      tags:
        - Jobs
      summary: Queue AI summary generation for a job
      responses:
        '200':
          description: Summary processing started
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Processing...
  '/api/jobs/{id}/summary':
    parameters:
      - $ref: '#/components/parameters/JobId'
    get:
      tags:
        - Jobs
      summary: Get cached summary result for a job
      responses:
        '200':
          description: Job summary text
          content:
            application/json:
              schema:
                type: string
                nullable: true
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ProjectId:
      name: project
      in: path
      required: true
      schema:
        type: integer
      description: ID of the project
    TaskId:
      name: task
      in: path
      required: true
      schema:
        type: integer
      description: ID of the task
    JobId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: ID of the job
    CompanyId:
      name: company
      in: path
      required: true
      schema:
        type: integer
      description: ID of the company
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
    UnprocessableEntity:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseValidationError'
  schemas:
    ApiResponseBase:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Success
    ApiResponseEmpty:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              nullable: true
              example: null
    ApiResponseError:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            success:
              type: boolean
              example: false
            errors:
              nullable: true
              example: null
    ApiResponseValidationError:
      allOf:
        - $ref: '#/components/schemas/ApiResponseError'
        - type: object
          properties:
            errors:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
              example:
                email:
                  - The email field is required.
                password:
                  - The password must be at least 8 characters.
    PaginationLinks:
      type: object
      properties:
        first:
          type: string
          nullable: true
        last:
          type: string
          nullable: true
        prev:
          type: string
          nullable: true
        next:
          type: string
          nullable: true
    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        from:
          type: integer
          nullable: true
        last_page:
          type: integer
        path:
          type: string
        per_page:
          type: integer
        to:
          type: integer
          nullable: true
        total:
          type: integer
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Jane Doe
        email:
          type: string
          format: email
          example: jane@example.com
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AuthPayload:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string
          example: 1|yourtokenhere
    ApiResponseAuth:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AuthPayload'
    ApiResponseUser:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/User'
    AuthRegisterRequest:
      type: object
      required:
        - name
        - email
        - password
        - password_confirmation
      properties:
        name:
          type: string
          maxLength: 255
          example: Aldo
        email:
          type: string
          format: email
          maxLength: 255
          example: aldo@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: Password123!
        password_confirmation:
          type: string
          format: password
          minLength: 8
          example: Password123!
    AuthLoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    Project:
      type: object
      properties:
        id:
          type: integer
          example: 10
        user_id:
          type: integer
          example: 1
        name:
          type: string
          example: Marketing board
        description:
          type: string
          nullable: true
          example: All marketing tasks
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    PaginatedProjects:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Project'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    ApiResponseProject:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Project'
    ApiResponseProjects:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/PaginatedProjects'
    ProjectRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: Sprint board
        description:
          type: string
          nullable: true
          example: Tasks for the sprint
    ProjectUpdateRequest:
      type: object
      properties:
        name:
          type: string
          example: Updated board
        description:
          type: string
          nullable: true
    Company:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: PT Teknologi Jaya
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
    CompanyRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 255
          example: PT Teknologi Jaya
    CompanyStoreResponse:
      type: object
      properties:
        message:
          type: string
          example: Success
        data:
          $ref: '#/components/schemas/Company'
    CompanyUpdateResponse:
      type: object
      properties:
        message:
          type: string
          example: Updated
        data:
          $ref: '#/components/schemas/Company'
    CompanyDeleteResponse:
      type: object
      properties:
        message:
          type: string
          example: Deleted
    PaginatedCompanies:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Company'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    CompanyCollectionResponse:
      allOf:
        - $ref: '#/components/schemas/PaginatedCompanies'
    Task:
      type: object
      properties:
        id:
          type: integer
          example: 100
        project_id:
          type: integer
          example: 10
        user_id:
          type: integer
          example: 1
        title:
          type: string
          example: Draft landing page
        description:
          type: string
          nullable: true
          example: Work with design to draft the hero section
        status:
          type: string
          enum:
            - pending
            - in_progress
            - done
          example: pending
        due_date:
          type: string
          format: date
          nullable: true
          example: '2025-12-31'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    PaginatedTasks:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    ApiResponseTask:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Task'
    ApiResponseTasks:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/PaginatedTasks'
    ApiResponseTaskStatuses:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/TaskStatus'
    TaskRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          example: Write copy
        description:
          type: string
          nullable: true
        status:
          type: string
          enum:
            - pending
            - in_progress
            - done
          example: pending
        due_date:
          type: string
          format: date
          nullable: true
          example: '2025-12-31'
    TaskUpdateRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum:
            - pending
            - in_progress
            - done
        due_date:
          type: string
          format: date
          nullable: true
    TaskStatus:
      type: object
      properties:
        value:
          type: string
          enum:
            - pending
            - in_progress
            - done
        label:
          type: string
          example: Pending
    Job:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Backend Engineer
        company_id:
          type: integer
          example: 1
        company_name:
          type: string
          nullable: true
          example: Wonsulting
        location:
          type: string
