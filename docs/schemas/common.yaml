ApiResponseBase:
  type: object
  properties:
    success:
      type: boolean
      example: true
    message:
      type: string
      example: Success

ApiResponseEmpty:
  allOf:
    - $ref: '#/ApiResponseBase'
    - type: object
      properties:
        data:
          nullable: true
          example: null

ApiResponseError:
  allOf:
    - $ref: '#/ApiResponseBase'
    - type: object
      properties:
        success:
          type: boolean
          example: false
        errors:
          nullable: true
          example: null

ApiResponseValidationError:
  allOf:
    - $ref: '#/ApiResponseError'
    - type: object
      properties:
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            email:
              - The email field is required.
            password:
              - The password must be at least 8 characters.

PaginationLinks:
  type: object
  properties:
    first:
      type: string
      nullable: true
    last:
      type: string
      nullable: true
    prev:
      type: string
      nullable: true
    next:
      type: string
      nullable: true

PaginationMeta:
  type: object
  properties:
    current_page:
      type: integer
    from:
      type: integer
      nullable: true
    last_page:
      type: integer
    path:
      type: string
    per_page:
      type: integer
    to:
      type: integer
      nullable: true
    total:
      type: integer
