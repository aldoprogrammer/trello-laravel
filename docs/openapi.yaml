openapi: 3.0.3
info:
  title: Trello Lite API
  version: 1.0.0
  description: API documentation for the Trello Lite backend (Laravel + Sanctum)
servers:
  - url: http://localhost:8000
    description: Local environment
tags:
  - name: Auth
  - name: Projects
  - name: Tasks
  - name: Jobs
paths:
  /api/auth/register:
    $ref: './paths/auth.yaml#/register'
  /api/auth/login:
    $ref: './paths/auth.yaml#/login'
  /api/auth/me:
    $ref: './paths/auth.yaml#/me'
  /api/auth/logout:
    $ref: './paths/auth.yaml#/logout'
  /api/projects:
    $ref: './paths/projects.yaml#/projects'
  /api/projects/{project}:
    $ref: './paths/projects.yaml#/projectById'
  /api/statuses:
    $ref: './paths/tasks.yaml#/statuses'
  /api/projects/{project}/tasks:
    $ref: './paths/tasks.yaml#/projectTasks'
  /api/projects/{project}/tasks/{task}:
    $ref: './paths/tasks.yaml#/projectTaskById'
  /api/jobs:
    $ref: './paths/jobs.yaml#/jobs'
  /api/jobs/{id}/summarize:
    $ref: './paths/jobs.yaml#/summarizeJob'
  /api/jobs/{id}/summary:
    $ref: './paths/jobs.yaml#/jobSummary'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ProjectId:
      name: project
      in: path
      required: true
      schema:
        type: integer
      description: ID of the project
    TaskId:
      name: task
      in: path
      required: true
      schema:
        type: integer
      description: ID of the task
    JobId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: ID of the job
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
    UnprocessableEntity:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseValidationError'
  schemas:
    ApiResponseBase:
      $ref: './schemas/common.yaml#/ApiResponseBase'
    ApiResponseAuth:
      $ref: './schemas/auth.yaml#/ApiResponseAuth'
    ApiResponseUser:
      $ref: './schemas/auth.yaml#/ApiResponseUser'
    ApiResponseProject:
      $ref: './schemas/projects.yaml#/ApiResponseProject'
    ApiResponseProjects:
      $ref: './schemas/projects.yaml#/ApiResponseProjects'
    ApiResponseTask:
      $ref: './schemas/tasks.yaml#/ApiResponseTask'
    ApiResponseTasks:
      $ref: './schemas/tasks.yaml#/ApiResponseTasks'
    ApiResponseTaskStatuses:
      $ref: './schemas/tasks.yaml#/ApiResponseTaskStatuses'
    ApiResponseEmpty:
      $ref: './schemas/common.yaml#/ApiResponseEmpty'
    ApiResponseError:
      $ref: './schemas/common.yaml#/ApiResponseError'
    ApiResponseValidationError:
      $ref: './schemas/common.yaml#/ApiResponseValidationError'
    User:
      $ref: './schemas/auth.yaml#/User'
    Project:
      $ref: './schemas/projects.yaml#/Project'
    Task:
      $ref: './schemas/tasks.yaml#/Task'
    Job:
      $ref: './schemas/jobs.yaml#/Job'
    PaginationLinks:
      $ref: './schemas/common.yaml#/PaginationLinks'
    PaginationMeta:
      $ref: './schemas/common.yaml#/PaginationMeta'
    PaginatedProjects:
      $ref: './schemas/projects.yaml#/PaginatedProjects'
    PaginatedTasks:
      $ref: './schemas/tasks.yaml#/PaginatedTasks'
    PaginatedJobs:
      $ref: './schemas/jobs.yaml#/PaginatedJobs'
    AuthPayload:
      $ref: './schemas/auth.yaml#/AuthPayload'
    AuthRegisterRequest:
      $ref: './schemas/auth.yaml#/AuthRegisterRequest'
    AuthLoginRequest:
      $ref: './schemas/auth.yaml#/AuthLoginRequest'
    ProjectRequest:
      $ref: './schemas/projects.yaml#/ProjectRequest'
    ProjectUpdateRequest:
      $ref: './schemas/projects.yaml#/ProjectUpdateRequest'
    TaskRequest:
      $ref: './schemas/tasks.yaml#/TaskRequest'
    TaskUpdateRequest:
      $ref: './schemas/tasks.yaml#/TaskUpdateRequest'
    TaskStatus:
      $ref: './schemas/tasks.yaml#/TaskStatus'
    JobRequest:
      $ref: './schemas/jobs.yaml#/JobRequest'
    JobResourceResponse:
      $ref: './schemas/jobs.yaml#/JobResourceResponse'
    JobCollectionResponse:
      $ref: './schemas/jobs.yaml#/JobCollectionResponse'
