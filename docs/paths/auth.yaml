register:
  post:
    tags: [Auth]
    summary: Register a new user
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/AuthRegisterRequest'
    responses:
      '201':
        description: User registered
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ApiResponseAuth'
      '422':
        $ref: '../openapi.yaml#/components/responses/UnprocessableEntity'

login:
  post:
    tags: [Auth]
    summary: Login and receive an access token
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/AuthLoginRequest'
    responses:
      '200':
        description: Login success
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ApiResponseAuth'
      '401':
        $ref: '../openapi.yaml#/components/responses/Unauthorized'
      '422':
        $ref: '../openapi.yaml#/components/responses/UnprocessableEntity'

me:
  get:
    tags: [Auth]
    summary: Get the authenticated user
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Current user
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ApiResponseUser'
      '401':
        $ref: '../openapi.yaml#/components/responses/Unauthorized'

logout:
  post:
    tags: [Auth]
    summary: Revoke the current access token
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Logout success
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/ApiResponseEmpty'
      '401':
        $ref: '../openapi.yaml#/components/responses/Unauthorized'
