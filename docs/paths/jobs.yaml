jobs:
  get:
    tags: [Jobs]
    summary: List jobs with search and filters
    security:
      - bearerAuth: []
    parameters:
      - name: search
        in: query
        required: false
        schema:
          type: string
        description: Search by title or location (partial match)
      - name: title
        in: query
        required: false
        schema:
          type: string
        description: Filter jobs by title (partial match)
      - name: location
        in: query
        required: false
        schema:
          type: string
        description: Filter jobs by location (partial match)
      - name: per_page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 15
        description: Number of records per page
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
        description: Page number
    responses:
      '200':
        description: Paginated job list
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/JobCollectionResponse'
  post:
    tags: [Jobs]
    summary: Create a new job
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components.yaml#/components/schemas/JobRequest'
    responses:
      '201':
        description: Job created
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/JobResourceResponse'
      '422':
        $ref: '../components.yaml#/components/responses/UnprocessableEntity'

summarizeJob:
  parameters:
    - $ref: '../components.yaml#/components/parameters/JobId'
  post:
    tags: [Jobs]
    summary: Queue AI summary generation for a job
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Summary processing started
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Processing...

jobSummary:
  parameters:
    - $ref: '../components.yaml#/components/parameters/JobId'
  get:
    tags: [Jobs]
    summary: Get cached summary result for a job
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Job summary text
        content:
          application/json:
            schema:
              type: string
              nullable: true
      '404':
        $ref: '../components.yaml#/components/responses/NotFound'
