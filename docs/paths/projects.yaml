projects:
  get:
    tags: [Projects]
    summary: List projects for the authenticated user
    security:
      - bearerAuth: []
    parameters:
      - name: per_page
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 15
        description: Items per page
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
        description: Page number
    responses:
      '200':
        description: Project list
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/ApiResponseProjects'
      '401':
        $ref: '../components.yaml#/components/responses/Unauthorized'
  post:
    tags: [Projects]
    summary: Create a project
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components.yaml#/components/schemas/ProjectRequest'
    responses:
      '201':
        description: Project created
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/ApiResponseProject'
      '401':
        $ref: '../components.yaml#/components/responses/Unauthorized'
      '422':
        $ref: '../components.yaml#/components/responses/UnprocessableEntity'

projectById:
  parameters:
    - $ref: '../components.yaml#/components/parameters/ProjectId'
  get:
    tags: [Projects]
    summary: Get project detail
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Project detail
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/ApiResponseProject'
      '401':
        $ref: '../components.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../components.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../components.yaml#/components/responses/NotFound'
  put:
    tags: [Projects]
    summary: Update a project
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components.yaml#/components/schemas/ProjectUpdateRequest'
    responses:
      '200':
        description: Project updated
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/ApiResponseProject'
      '401':
        $ref: '../components.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../components.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../components.yaml#/components/responses/NotFound'
      '422':
        $ref: '../components.yaml#/components/responses/UnprocessableEntity'
  delete:
    tags: [Projects]
    summary: Delete a project
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Project deleted
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/ApiResponseEmpty'
      '401':
        $ref: '../components.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../components.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../components.yaml#/components/responses/NotFound'
