companies:
  get:
    tags: [Companies]
    summary: List companies with optional filters
    security:
      - bearerAuth: []
    parameters:
      - name: search
        in: query
        required: false
        schema:
          type: string
        description: Full-text search keyword (Scout/Meilisearch)
      - name: name
        in: query
        required: false
        schema:
          type: string
        description: Filter by partial company name (SQL LIKE)
      - name: per_page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 15
        description: Number of items per page
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
        description: Page number
    responses:
      '200':
        description: Paginated company list
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/CompanyCollectionResponse'
      '401':
        $ref: '../components.yaml#/components/responses/Unauthorized'
  post:
    tags: [Companies]
    summary: Create a company
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components.yaml#/components/schemas/CompanyRequest'
    responses:
      '201':
        description: Company created
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/CompanyStoreResponse'
      '401':
        $ref: '../components.yaml#/components/responses/Unauthorized'
      '422':
        $ref: '../components.yaml#/components/responses/UnprocessableEntity'

companyById:
  parameters:
    - $ref: '../components.yaml#/components/parameters/CompanyId'
  get:
    tags: [Companies]
    summary: Get company detail
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Company detail
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/Company'
      '401':
        $ref: '../components.yaml#/components/responses/Unauthorized'
      '404':
        $ref: '../components.yaml#/components/responses/NotFound'
  put:
    tags: [Companies]
    summary: Update a company
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components.yaml#/components/schemas/CompanyRequest'
    responses:
      '200':
        description: Company updated
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/CompanyUpdateResponse'
      '401':
        $ref: '../components.yaml#/components/responses/Unauthorized'
      '404':
        $ref: '../components.yaml#/components/responses/NotFound'
      '422':
        $ref: '../components.yaml#/components/responses/UnprocessableEntity'
  delete:
    tags: [Companies]
    summary: Delete a company
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Company deleted
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/CompanyDeleteResponse'
      '401':
        $ref: '../components.yaml#/components/responses/Unauthorized'
      '404':
        $ref: '../components.yaml#/components/responses/NotFound'
