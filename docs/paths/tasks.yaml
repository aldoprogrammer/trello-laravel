statuses:
  get:
    tags: [Tasks]
    summary: List available task statuses
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Task statuses
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/ApiResponseTaskStatuses'
      '401':
        $ref: '../components.yaml#/components/responses/Unauthorized'

projectTasks:
  parameters:
    - $ref: '../components.yaml#/components/parameters/ProjectId'
  get:
    tags: [Tasks]
    summary: List tasks for a project
    security:
      - bearerAuth: []
    parameters:
      - name: per_page
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 15
        description: Items per page
    responses:
      '200':
        description: Task list
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/ApiResponseTasks'
      '401':
        $ref: '../components.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../components.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../components.yaml#/components/responses/NotFound'
  post:
    tags: [Tasks]
    summary: Create a task for a project
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components.yaml#/components/schemas/TaskRequest'
    responses:
      '201':
        description: Task created
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/ApiResponseTask'
      '401':
        $ref: '../components.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../components.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../components.yaml#/components/responses/NotFound'
      '422':
        $ref: '../components.yaml#/components/responses/UnprocessableEntity'

projectTaskById:
  parameters:
    - $ref: '../components.yaml#/components/parameters/ProjectId'
    - $ref: '../components.yaml#/components/parameters/TaskId'
  get:
    tags: [Tasks]
    summary: Get task detail
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Task detail
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/ApiResponseTask'
      '401':
        $ref: '../components.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../components.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../components.yaml#/components/responses/NotFound'
  put:
    tags: [Tasks]
    summary: Update a task
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components.yaml#/components/schemas/TaskUpdateRequest'
    responses:
      '200':
        description: Task updated
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/ApiResponseTask'
      '401':
        $ref: '../components.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../components.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../components.yaml#/components/responses/NotFound'
      '422':
        $ref: '../components.yaml#/components/responses/UnprocessableEntity'
  delete:
    tags: [Tasks]
    summary: Delete a task
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Task deleted
        content:
          application/json:
            schema:
              $ref: '../components.yaml#/components/schemas/ApiResponseEmpty'
      '401':
        $ref: '../components.yaml#/components/responses/Unauthorized'
      '403':
        $ref: '../components.yaml#/components/responses/Forbidden'
      '404':
        $ref: '../components.yaml#/components/responses/NotFound'
