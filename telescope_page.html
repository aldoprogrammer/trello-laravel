<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telescope - TrelloLite</title>
    <style>
        :root {
            color-scheme: light;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            font-family: Segoe UI, Arial, sans-serif;
            background: #f5f7fb;
            color: #111827;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid #d1d5db;
            background: #ffffff;
        }

        .title {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
        }

        .link {
            color: #2563eb;
            text-decoration: none;
            font-size: 14px;
        }

        .link:hover {
            text-decoration: underline;
        }

        .frame {
            width: 100%;
            height: calc(100% - 49px);
            border: 0;
            display: block;
            appearance: none;
            -webkit-appearance: none;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1 class="title">Laravel Telescope</h1>
        <a class="link" href="/telescope" target="_blank" rel="noopener">Open in new tab</a>
    </header>

    <iframe class="frame" src="/telescope" title="Laravel Telescope"></iframe>
</body>
</html>
