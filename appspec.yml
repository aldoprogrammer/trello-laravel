version: 0.0
os: linux
files:
  - source: /
    destination: /home/ubuntu/trello-laravel
permissions:
  - object: /home/ubuntu/trello-laravel
    pattern: "**"
    owner: ubuntu
    group: ubuntu
    mode: 755
hooks:
  AfterInstall:
    - location: scripts/restart_server.sh
      timeout: 600
      runas: root
